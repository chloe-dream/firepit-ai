name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Firepit.slnx

      - name: Build
        run: dotnet build Firepit.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Firepit.slnx --configuration Release --no-build --verbosity normal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish Firepit (single-file, self-contained, win-x64)
        run: >
          dotnet publish src/Firepit/Firepit.csproj
          -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish firepit-mcp bridge (stdio↔pipe, single-file, self-contained)
        run: >
          dotnet publish tools/firepit-mcp/Firepit.Mcp.Bridge.csproj
          -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $numeric = $tag -replace '^v', ''
          "version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "numeric=$numeric" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Archive (zip)
        shell: pwsh
        run: |
          Compress-Archive `
            -Path bin/win-x64/* `
            -DestinationPath "firepit-${{ steps.version.outputs.version }}-win-x64.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.version.outputs.numeric }}" `
            installer\firepit.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firepit-${{ steps.version.outputs.version }}-win-x64.zip
            bin/installer/FirepitSetup-${{ steps.version.outputs.numeric }}-win-x64.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
