<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://firepit.local; script-src 'self' https://firepit.local 'unsafe-inline'; style-src 'self' https://firepit.local 'unsafe-inline'; font-src 'self' https://firepit.local data:; img-src 'self' https://firepit.local data:; connect-src 'none';">
    <title>Firepit Terminal</title>
    <link rel="stylesheet" href="xterm.css">
    <style>
        @font-face {
            /* Embedded variable font — covers regular through bold without
               needing the system Cascadia Code install. ~380 KB. */
            font-family: 'Cascadia Code';
            src: url('CascadiaCode.ttf') format('truetype-variations');
            font-weight: 200 800;
            font-style: normal;
            font-display: block;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #1a1612;
            overflow: hidden;
        }
        /* Use offsets, NOT padding. fit-addon reads padding from the .xterm
           element (always 0), not from this wrapper — padding here would be
           invisible to the rows-fits calculation and the last line + scrollbar
           tail would overflow past the bottom of the visible area. */
        #terminal {
            position: absolute;
            top: 8px;
            bottom: 8px;
            left: 8px;
            right: 0;
            box-sizing: border-box;
        }
        /* Slim centered pill: track is 14px, pill is the inner ~6px.
           border:transparent + background-clip is buggy on WebKit pseudo-
           scrollbars — solid bg-coloured border is the reliable trick. */
        .xterm-viewport::-webkit-scrollbar {
            width: 14px;
            background-color: #1a1612;
        }
        .xterm-viewport::-webkit-scrollbar-track {
            background-color: #1a1612;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background-color: #5C4D3E;
            border: 4px solid #1a1612;
            border-radius: 7px;
            min-height: 36px;
        }
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background-color: #7A6855;
            border: 4px solid #1a1612;
        }
        .xterm-viewport::-webkit-scrollbar-thumb:active {
            background-color: #A89F92;
            border: 4px solid #1a1612;
        }
        .xterm-viewport::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* Search overlay — Windows-Terminal-style floating panel, top-right
           of the active terminal. Hidden by default, toggled via Ctrl+Shift+F. */
        #search-overlay {
            position: absolute;
            top: 14px;
            right: 22px;
            background: #2A211A;
            border: 1px solid #5C4D3E;
            border-radius: 4px;
            padding: 6px;
            display: flex;
            gap: 6px;
            align-items: center;
            z-index: 100;
            font-family: 'Cascadia Code', Consolas, monospace;
            font-size: 12px;
            color: #E8E2D8;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        }
        #search-overlay.hidden { display: none; }
        #search-input {
            background: #1A1612;
            border: 1px solid #332B22;
            color: #E8E2D8;
            caret-color: #E8E2D8;
            padding: 4px 6px;
            width: 220px;
            font-family: inherit;
            font-size: inherit;
            outline: none;
        }
        #search-input:focus { border-color: #F5C97B; }
        #search-count {
            color: #A89F92;
            min-width: 56px;
            text-align: center;
            user-select: none;
        }
        #search-overlay button {
            background: transparent;
            border: 1px solid transparent;
            color: #A89F92;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 14px;
            line-height: 1;
            min-width: 22px;
        }
        #search-overlay button:hover {
            background: #332B22;
            color: #E8E2D8;
        }
        #search-overlay button:disabled {
            opacity: 0.4;
            cursor: default;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="search-overlay" class="hidden">
        <input id="search-input" type="text" placeholder="Search…" spellcheck="false" autocomplete="off">
        <span id="search-count">0/0</span>
        <button id="search-prev" title="Previous (Shift+Enter)">↑</button>
        <button id="search-next" title="Next (Enter)">↓</button>
        <button id="search-close" title="Close (Esc)">×</button>
    </div>
    <script src="xterm.js"></script>
    <script src="addon-fit.js"></script>
    <script src="addon-search.js"></script>
    <script>
        (function () {
            'use strict';

            const term = new Terminal({
                fontFamily: 'Cascadia Code, Consolas, Courier New, monospace',
                fontSize: 14,
                cursorBlink: true,
                // Win-Terminal-style selection: high contrast so it's actually
                // visible, dark fg on light bg for readability, plus an
                // explicit inactive colour so the selection stays visible when
                // focus shifts to the chrome / another app momentarily.
                theme: {
                    background: '#1a1612',
                    foreground: '#e8e2d8',
                    cursor: '#e8e2d8',
                    selectionBackground:         '#7A6855',
                    selectionForeground:         '#15110D',
                    selectionInactiveBackground: '#3A3026',
                },
                allowProposedApi: true,
                // We treat right-click as paste (Win-Terminal default since
                // 2020). Without this xterm would also word-select on right
                // click and the contextmenu handler would race with it.
                rightClickSelectsWord: false,
            });

            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            // Terminal-search addon. Decorations use brand warm tones —
            // active match takes the same accent as the selected-tab line so
            // the visual language stays cohesive across the chrome.
            const searchAddon = new SearchAddon.SearchAddon();
            term.loadAddon(searchAddon);
            const searchDecorations = {
                matchBackground:                '#5C4D3E',
                matchBorder:                    '#7A6855',
                matchOverviewRuler:             '#7A6855',
                activeMatchBackground:          '#F5C97B',
                activeMatchBorder:              '#F5C97B',
                activeMatchColorOverviewRuler:  '#F5C97B',
            };
            // term.open() is deferred to after font load — see startup() below.

            function postToHost(message) {
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(JSON.stringify(message));
                }
            }

            function fromBase64(b64) {
                const binary = atob(b64);
                const len = binary.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
                return bytes;
            }

            function toBase64(bytes) {
                let binary = '';
                const len = bytes.length;
                for (let i = 0; i < len; i++) binary += String.fromCharCode(bytes[i]);
                return btoa(binary);
            }

            const utf8Encoder = new TextEncoder();

            term.onData(function (data) {
                postToHost({ type: 'input', b64: toBase64(utf8Encoder.encode(data)) });
            });

            term.onResize(function (size) {
                postToHost({ type: 'resize', cols: size.cols, rows: size.rows });
            });

            // OSC 9;4 (ConEmu/Windows-Terminal tab-progress protocol). Claude
            // Code emits state=3 (indeterminate) during thinking and tool
            // calls, state=0 to clear. We use this to keep the tab "burning"
            // while the agent is busy but not writing — e.g. waiting on an LLM
            // response. xterm's parser hands us "4;<state>[;<value>]" stripped
            // of the OSC header. Returning true tells xterm we consumed it.
            if (term.parser && typeof term.parser.registerOscHandler === 'function') {
                term.parser.registerOscHandler(9, function (data) {
                    if (typeof data !== 'string' || data.length < 3) return false;
                    if (data.charCodeAt(0) !== 52 /* '4' */ || data.charCodeAt(1) !== 59 /* ';' */) return false;
                    const parts = data.split(';');
                    if (parts.length < 2) return false;
                    const state = parseInt(parts[1], 10);
                    if (!Number.isFinite(state)) return false;
                    postToHost({ type: 'progress', state: state });
                    return true;
                });

                // OSC 52 — clipboard write. TUI apps (Claude Code's "copy to
                // clipboard", tmux, vim, etc.) put text on the system clipboard
                // by emitting ESC ] 52 ; c ; <base64> ST. xterm does NOT wire
                // OSC 52 to a real clipboard by default (it's security-gated),
                // so without this the agent's on-screen "Copied!" is a lie — the
                // bytes never leave the terminal. As a transparent host we
                // forward the decoded text to the host, which owns the Windows
                // clipboard. xterm hands us "<selection>;<payload>", e.g.
                // "c;SGVsbG8=" (c=clipboard, p=primary — both map to clipboard).
                term.parser.registerOscHandler(52, function (data) {
                    if (typeof data !== 'string') return false;
                    const sep = data.indexOf(';');
                    if (sep < 0) return false;
                    const payload = data.slice(sep + 1);
                    // "?" is a READ/query request — servicing it would silently
                    // leak the user's clipboard to the agent, so we decline it
                    // (and an empty payload clears, which we also skip).
                    if (payload === '' || payload === '?') return true;
                    try {
                        const text = new TextDecoder().decode(fromBase64(payload));
                        if (text) postToHost({ type: 'copy', text: text });
                    } catch (e) { /* malformed base64 — ignore */ }
                    return true;
                });
            }

            // Search overlay wiring. The DOM lives in static markup; we just
            // hook events here. Live-search on input, Enter / Shift+Enter
            // navigate, Esc closes & clears decorations. Match count comes
            // from the addon's onDidChangeResults event.
            const searchOverlay = document.getElementById('search-overlay');
            const searchInput   = document.getElementById('search-input');
            const searchCount   = document.getElementById('search-count');
            const searchPrev    = document.getElementById('search-prev');
            const searchNext    = document.getElementById('search-next');
            const searchClose   = document.getElementById('search-close');

            function openSearch() {
                searchOverlay.classList.remove('hidden');
                searchInput.focus();
                searchInput.select();
            }
            function closeSearch() {
                searchOverlay.classList.add('hidden');
                searchAddon.clearDecorations();
                searchInput.value = '';
                searchCount.textContent = '0/0';
                term.focus();
            }
            function findNext()   {
                if (searchInput.value) searchAddon.findNext(searchInput.value, { decorations: searchDecorations });
            }
            function findPrev()   {
                if (searchInput.value) searchAddon.findPrevious(searchInput.value, { decorations: searchDecorations });
            }

            searchAddon.onDidChangeResults(function (e) {
                if (!e || typeof e.resultCount !== 'number') {
                    searchCount.textContent = '0/0';
                    return;
                }
                // resultIndex is -1 when there are matches but none active yet
                // (e.g. after typing but before pressing Enter). Show 0/total
                // in that case so the count makes sense to the user.
                const idx = e.resultIndex >= 0 ? e.resultIndex + 1 : 0;
                searchCount.textContent = idx + '/' + e.resultCount;
            });

            searchInput.addEventListener('input', findNext);
            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    if (e.shiftKey) findPrev(); else findNext();
                    e.preventDefault();
                } else if (e.key === 'Escape') {
                    closeSearch();
                    e.preventDefault();
                }
            });
            searchPrev.addEventListener('click', findPrev);
            searchNext.addEventListener('click', findNext);
            searchClose.addEventListener('click', closeSearch);

            // Clipboard / Terminal-input UX (Phase 5).
            // Returning false suppresses xterm's normal handling for that key.
            term.attachCustomKeyEventHandler(function (e) {
                if (e.type !== 'keydown') return true;
                const ctrl  = e.ctrlKey || e.metaKey;
                const shift = e.shiftKey;
                const k     = e.key;

                // Ctrl+Shift+F → open search overlay. Ctrl+F alone stays free
                // for the agent's own readline / fzf bindings inside claude.
                if (ctrl && shift && (k === 'f' || k === 'F')) {
                    openSearch();
                    e.preventDefault();
                    return false;
                }

                // Ctrl+V or Ctrl+Shift+V → paste from host clipboard
                if (ctrl && (k === 'v' || k === 'V')) {
                    postToHost({ type: 'paste-request' });
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+C → always copy (Terminal convention).
                // We deliberately do NOT clearSelection — Win Terminal keeps
                // the selection visible after copy as visual confirmation.
                if (ctrl && shift && (k === 'c' || k === 'C')) {
                    if (term.hasSelection()) {
                        postToHost({ type: 'copy', text: term.getSelection() });
                    }
                    e.preventDefault();
                    return false;
                }
                // Ctrl+C → copy if there's a selection, otherwise let xterm
                // forward ^C to the PTY (standard SIGINT behaviour).
                if (ctrl && !shift && (k === 'c' || k === 'C')) {
                    if (term.hasSelection()) {
                        postToHost({ type: 'copy', text: term.getSelection() });
                        e.preventDefault();
                        return false;
                    }
                }
                // Enter with an active selection → copy it, clear it, and
                // swallow the keystroke (no CR to the PTY). Classic conhost
                // QuickEdit behaviour — long-standing Windows muscle memory.
                // The selection is visibly highlighted, so the consumed Enter
                // isn't surprising hidden state. Plain Enter only — any
                // modifier (incl. Alt) falls through to the shell.
                if (k === 'Enter' && !ctrl && !shift && !e.altKey && term.hasSelection()) {
                    postToHost({ type: 'copy', text: term.getSelection() });
                    term.clearSelection();
                    e.preventDefault();
                    return false;
                }
                return true;
            });

            // Right-click is smart copy/paste (Win Terminal default):
            //   selection present → copy it & clear, no menu, no toast
            //   no selection      → paste from host clipboard
            // Registered in the CAPTURE phase with stopImmediatePropagation so
            // xterm's OWN built-in contextmenu handler (which moves + focuses the
            // hidden textarea and primes it for a native menu copy/paste) never
            // runs. Firepit's postToHost path is then the single authority for
            // right-click clipboard, ruling out any xterm-side second paste.
            document.addEventListener('contextmenu', function (e) {
                e.preventDefault();
                e.stopImmediatePropagation();
                if (term.hasSelection()) {
                    postToHost({ type: 'copy', text: term.getSelection() });
                    term.clearSelection();
                } else {
                    postToHost({ type: 'paste-request' });
                }
            }, true);

            // The RIGHT mouse button belongs to Firepit (copy/paste), never the
            // app. In mouse-reporting mode xterm forwards a right-click to the
            // app (Claude Code) as a mouse event, and the app then pastes on its
            // own — an INTERMITTENT second paste on top of our contextmenu paste
            // (which is why the double came and went). Swallow the right button
            // in the capture phase, before xterm's bubble-phase mouse handler
            // reports it to the PTY; the contextmenu handler above does the
            // actual copy/paste.
            function swallowRightButton(e) {
                if (e.button === 2) {
                    e.stopImmediatePropagation();
                }
            }
            document.addEventListener('mousedown', swallowRightButton, true);
            document.addEventListener('mouseup', swallowRightButton, true);
            document.addEventListener('auxclick', swallowRightButton, true);

            window.chrome.webview.addEventListener('message', function (event) {
                let message;
                try { message = JSON.parse(event.data); } catch (e) { return; }
                if (!message || typeof message.type !== 'string') return;

                switch (message.type) {
                    case 'data': {
                        if (typeof message.b64 !== 'string') return;
                        term.write(fromBase64(message.b64));
                        break;
                    }
                    case 'resize': {
                        if (typeof message.cols === 'number' && typeof message.rows === 'number') {
                            term.resize(message.cols, message.rows);
                        }
                        break;
                    }
                    case 'theme': {
                        // Settings-driven xterm palette. Host posts a flat
                        // object with xterm-style keys; we merge into the
                        // existing theme so absent keys keep their defaults.
                        const t = message.theme;
                        if (t && typeof t === 'object') {
                            term.options.theme = Object.assign({}, term.options.theme, {
                                background:                  t.background                  || term.options.theme.background,
                                foreground:                  t.foreground                  || term.options.theme.foreground,
                                cursor:                      t.cursor                      || term.options.theme.cursor,
                                selectionBackground:         t.selectionBackground         || term.options.theme.selectionBackground,
                                selectionForeground:         t.selectionForeground         || term.options.theme.selectionForeground,
                                selectionInactiveBackground: t.selectionInactiveBackground || term.options.theme.selectionInactiveBackground,
                            });
                        }
                        break;
                    }
                    case 'font': {
                        // V1.13 — single-knob font scaling. Host posts the new
                        // size, we apply it to xterm and refit so the cell
                        // metrics + cols/rows match what the host expects.
                        if (typeof message.size === 'number' && message.size >= 6 && message.size <= 64) {
                            term.options.fontSize = message.size;
                            try { fitAddon.fit(); } catch (e) { /* ignore */ }
                        }
                        break;
                    }
                    case 'paste': {
                        if (typeof message.text === 'string') {
                            term.paste(message.text);
                        }
                        break;
                    }
                    case 'focus': {
                        // Host (e.g. on tab switch) asks xterm to take focus
                        // so the user can type immediately without clicking.
                        try { term.focus(); } catch (e) { /* ignore */ }
                        break;
                    }
                    default:
                        // unknown — ignore
                        break;
                }
            });

            // ---- Sizing / visibility resilience ----------------------------
            // A terminal can finish booting while its tab is in the background:
            // the user clicks a tab, then switches away before WebView2 + xterm
            // are ready. A WebView2 that isn't compositing (its host hwnd is
            // Collapsed for the inactive tab) suspends requestAnimationFrame and
            // lays the page out at zero size. That used to (a) hang the 'ready'
            // handshake — rAF was the only trigger, so the host timed the tab
            // out or left it stuck "igniting" — and (b) lock in a one-column,
            // microscopic-font grid, because open()/fit() measured a hidden,
            // zero-sized container. Defence: never gate 'ready' on rAF alone,
            // and re-measure + re-fit whenever the terminal is (re)shown or the
            // embedded font finishes loading.
            let opened = false;
            let fittedVisible = false;

            function terminalVisible() {
                const el = document.getElementById('terminal');
                return !document.hidden && !!el && el.clientWidth > 0 && el.clientHeight > 0;
            }

            function fitNow() {
                if (!opened || !terminalVisible()) return;
                try { fitAddon.fit(); fittedVisible = true; } catch (e) { /* ignore */ }
            }

            // Coalesce resize/reveal "storms" into a SINGLE fit at the final,
            // stable size. When a tab goes Collapsed→Visible the WebView2 host
            // resizes the page in several steps as WPF layout settles, and the
            // ResizeObserver fires for each intermediate size. Fitting on every
            // callback resized the PTY to a transient wrong size and then again
            // to the correct one — a visible double-reflow ("refresh") that lost
            // on-screen context, worst on content-heavy sessions. Debouncing
            // makes us fit once, after the size stops changing.
            let fitTimer = null;
            function scheduleFit() {
                if (!opened) return;
                if (fitTimer) clearTimeout(fitTimer);
                fitTimer = setTimeout(function () {
                    fitTimer = null;
                    if (!terminalVisible()) return;
                    // Force a one-time cell re-measure if the boot fit ran while
                    // hidden (zero size → microscopic metrics). xterm only
                    // re-measures the cell when a font option value changes, so
                    // nudge font-family to an equivalent string and back.
                    if (!fittedVisible) {
                        const ff = term.options.fontFamily;
                        try {
                            term.options.fontFamily = ff + ' ';
                            term.options.fontFamily = ff;
                        } catch (e) { /* ignore */ }
                    }
                    fitNow();
                }, 90);
            }

            window.addEventListener('resize', scheduleFit);
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) scheduleFit();
            });
            if (typeof ResizeObserver === 'function') {
                // Both the hidden→shown reveal and a live window resize funnel
                // through the same debounce — intermediate sizes are swallowed,
                // only the settled size reaches fitAddon.fit().
                const ro = new ResizeObserver(function () {
                    const el = document.getElementById('terminal');
                    const h = el ? el.clientHeight : 0;
                    if (h > 0) scheduleFit();
                });
                try { ro.observe(document.getElementById('terminal')); } catch (e) { /* ignore */ }
            }

            let announced = false;
            function announceReady() {
                if (announced) return;
                announced = true;
                fitNow(); // skipped while hidden — a reveal handler refits later
                // Resize MUST be posted before 'ready' — the host blocks on the
                // ready handshake to spawn the agent with the correct dimensions.
                postToHost({ type: 'resize', cols: term.cols, rows: term.rows });
                postToHost({ type: 'ready' });
            }

            // Open xterm AFTER the embedded Cascadia Code font is loaded.
            // Otherwise xterm measures cell width with whatever fallback the
            // browser rendered first, fit-addon picks a column count for that
            // metric, and once the real font swaps in the lines overflow into
            // the reserved scrollbar gutter. (If the boot cap below opens early,
            // the fontReady refit recovers the metrics once the font lands.)
            function startup() {
                term.open(document.getElementById('terminal'));
                opened = true;
                // rAF is suspended while the tab isn't compositing, so it cannot
                // be the sole trigger for 'ready' — that hang is what left tabs
                // stuck "igniting". Race a timer that fires even when the page
                // is hidden; announceReady is idempotent so only the first wins.
                requestAnimationFrame(announceReady);
                setTimeout(announceReady, 200);
            }

            let started = false;
            function startupOnce() { if (!started) { started = true; startup(); } }

            const domReady = (document.readyState === 'complete')
                ? Promise.resolve()
                : new Promise(function (r) { window.addEventListener('load', r); });

            const fontReady = (document.fonts && document.fonts.load)
                ? document.fonts.load('14px "Cascadia Code"')
                    .then(function () { return document.fonts.load('bold 14px "Cascadia Code"'); })
                    .catch(function () { /* font may be missing — proceed with fallback */ })
                : Promise.resolve();

            fontReady.then(function () { scheduleFit(); });
            Promise.all([domReady, fontReady]).then(startupOnce);
            // Hard cap: never let a hung font fetch or a missing 'load' event
            // stall boot past the host's 15 s ready window.
            setTimeout(startupOnce, 3000);
        })();
    </script>
</body>
</html>
